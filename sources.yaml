# ============================================================
# 科技比赛 / 补贴专项 · 监控源配置
# ============================================================
# 改这里就能用。webhook 可直接填，也可留空用环境变量（见 README）。

# 关键词：标题命中任一即推送（支持正则）。完整字典见 04-数据源清单.md
keywords:
  # —— 补贴 / 资质 ——
  - 高新技术企业
  - 专精特新
  - 小巨人
  - 科技型中小企业
  - 重点研发计划
  - 科技重大专项
  - 揭榜挂帅
  - 申报指南
  - 项目申报
  # —— 创新创业大赛 ——
  - 创新创业大赛
  - 创客中国
  - 创业大赛
  - 创翼
  - 创赢未来
  - 创青春
  - 颠覆性技术
  # —— 行业 / 学科专业赛 ——
  - 挑战杯
  - 大学生创新大赛
  - 电子设计竞赛
  - 智能汽车竞赛
  - 数学建模
  - 节能减排
  - 软件杯
  - 绽放杯
  - 光华杯
  - 工业互联网大赛
  - 数字中国创新大赛
  - 科创中国
  - 发明创业

# RSS 源（结构化、最省心）
rss:
  - name: 深圳盐田政府
    url: https://www.yantian.gov.cn/rss/
  - name: 国家统计局
    url: https://www.stats.gov.cn/wzgl/rss/
  # 更多 RSS：到你省/市科技厅官网底部找"RSS 订阅"

# 通知页（HTML 抓取，提取页面上的 <a> 链接）
# item_selector 可选：限定抓取区块的 CSS 选择器；不配则抓全页
pages:
  # —— 部委通知页（综合：政策/赛事/补贴，传统服务端渲染，抓取稳定）——
  - name: 科技部·科技管理信息系统
    url: https://service.most.gov.cn/
  - name: 工业和信息化部
    url: https://www.miit.gov.cn/
  - name: 工信部·网络安全产业发展中心
    url: https://www.miitxxzx.org.cn/
  - name: 国家自然科学基金委
    url: https://www.nsfc.gov.cn/publish/portal0/tab44/
  - name: 人力资源社会保障部
    url: http://www.mohrss.gov.cn/
  - name: 国家知识产权局
    url: https://www.cnipa.gov.cn/
  - name: 中国科学技术协会
    url: https://www.cast.org.cn/
  - name: 中央网信办
    url: http://www.cac.gov.cn/
  # —— 省市科委 ——
  - name: 北京市科委
    url: https://kw.beijing.gov.cn/zwgk/zcwj/
  - name: 上海市科委
    url: https://stcsm.sh.gov.cn/zwgk/tzgs/
  - name: 深圳市科创委
    url: https://stic.sz.gov.cn/xxgk/tzgg/
  # —— 科技部系赛事 ——
  - name: 中国创新创业大赛
    url: http://www.cxcyds.com/
  - name: 全国颠覆性技术创新大赛
    url: https://www.dipa.cn/
  # —— 工信部系赛事 ——
  - name: 创客中国
    url: http://www.cncxcyds.com/
  - name: 中国软件杯
    url: https://www.cnsoftbei.com/
  - name: 绽放杯5G应用征集大赛
    url: https://www.5gaia.org.cn/
  # —— 教育部系赛事 ——
  - name: 中国国际大学生创新大赛
    url: https://cy.ncss.cn/
  - name: 全国大学生电子设计竞赛
    url: https://www.nuedc-training.com.cn/
  # —— 团中央 / 科协 / 数字中国 ——
  - name: 挑战杯
    url: https://www.tiaozhanbei.net/
  - name: 科创中国
    url: https://kczg.zgclmlhh.org.cn/
  - name: 数字中国创新大赛
    url: https://www.szzg.gov.cn/cxds/

# 推送通道（任选其一或多；留空表示不启用）
notify:
  feishu:
    webhook: ""        # 走 GitHub Secrets: FEISHU_WEBHOOK
  dingtalk:
    webhook: ""        # 钉钉群机器人 webhook
    secret: ""         # 钉钉加签密钥（机器人安全设置选"加签"时填）
  wecom:
    webhook: ""        # 企业微信群机器人 webhook
  serverchan:
    key: ""            # Server酱 SendKey（sct.ftqq.com）
  email:
    smtp_host: ""      # 如 smtp.qq.com
    smtp_port: 465
    smtp_user: ""
    smtp_pass: ""
    from: ""
    to: ""

# 去重数据库
db: seen.db

# 抓取设置
fetch:
  timeout: 20
  per_source_limit: 30   # 每个源最多取最近 N 条
